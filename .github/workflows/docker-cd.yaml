name: Docker | Build and Push

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: arc-scale-set
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}