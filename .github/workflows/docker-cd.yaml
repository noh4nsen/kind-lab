name: Docker | Build and Push

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to build (e.g., test-api)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  detect-changes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.detect.outputs.projects }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed projects
        id: detect
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.project }}" ]; then
            # Manual trigger with specific project
            echo "projects=[\"${{ inputs.project }}\"]" >> "$GITHUB_OUTPUT"
          else
            # Auto-detect changed projects
            if [ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]; then
              # First push to branch - check all projects
              CHANGED_DIRS=$(find src -mindepth 1 -maxdepth 1 -type d -exec basename {} \;)
            else
              # Get changed files since last commit
              CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
              CHANGED_DIRS=$(echo "$CHANGED_FILES" | grep '^src/' | cut -d'/' -f2 | sort -u)
            fi
            
            # Convert to JSON array
            PROJECTS=$(echo "$CHANGED_DIRS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "projects=${PROJECTS}" >> "$GITHUB_OUTPUT"
            echo "Detected projects: ${PROJECTS}"
          fi

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.projects != '[]'
    runs-on: arc-scale-set
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.projects) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate project structure
        id: validate
        run: |
          PROJECT_PATH="src/${{ matrix.project }}"
          
          if [ ! -d "$PROJECT_PATH" ]; then
            echo "Project directory not found: $PROJECT_PATH"
            exit 1
          fi
          
          if [ ! -f "$PROJECT_PATH/Dockerfile" ]; then
            echo "Dockerfile not found in $PROJECT_PATH"
            exit 1
          fi
          
          if [ ! -f "$PROJECT_PATH/chart/values.yaml" ]; then
            echo "Helm chart values.yaml not found in $PROJECT_PATH/chart/"
            exit 1
          fi
          
          echo "Project structure validated"
          echo "context=$PROJECT_PATH" >> "$GITHUB_OUTPUT"
          echo "dockerfile=$PROJECT_PATH/Dockerfile" >> "$GITHUB_OUTPUT"
          echo "chart_values=$PROJECT_PATH/chart/values.yaml" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Generate Image Refs
        id: image-refs
        run: |
          IMAGE_TAG=$(date +%Y%m%d).${{ github.run_number }}
          IMAGE_REPO="${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.project }}"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.validate.outputs.context }}
          file: ${{ steps.validate.outputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.image-refs.outputs.image_repo }}:${{ steps.image-refs.outputs.image_tag }}
            ${{ steps.image-refs.outputs.image_repo }}:latest

      - name: Install yq
        run: |
          if ! command -v yq >/dev/null 2>&1; then
            sudo curl -fsSL -o /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi
          yq --version

      - name: Update Helm values with new image
        env:
          IMAGE_REPO: ${{ steps.image-refs.outputs.image_repo }}
          IMAGE_TAG: ${{ steps.image-refs.outputs.image_tag }}
          CHART_VALUES_FILE: ${{ steps.validate.outputs.chart_values }}
        run: |
          yq -i '.image.repository = strenv(IMAGE_REPO)' "${CHART_VALUES_FILE}"
          yq -i '.image.tag = strenv(IMAGE_TAG)' "${CHART_VALUES_FILE}"
          echo "Updated ${CHART_VALUES_FILE}:"
          cat "${CHART_VALUES_FILE}"

      - name: Commit and push chart update
        env:
          CHART_VALUES_FILE: ${{ steps.validate.outputs.chart_values }}
        run: |
          if git diff --quiet -- "${CHART_VALUES_FILE}"; then
            echo "No chart changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${CHART_VALUES_FILE}"
          git commit -m "chore(${{ matrix.project }}): bump image to ${{ steps.image-refs.outputs.image_tag }} [skip ci]"
          
          # Retry logic for concurrent pushes
          MAX_RETRIES=5
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            git pull --rebase origin ${{ github.ref_name }} && \
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }} && \
            break || {
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "Push failed, retrying in 5 seconds... (attempt $RETRY_COUNT/$MAX_RETRIES)"
                sleep 5
              else
                echo "Failed to push after $MAX_RETRIES attempts"
                exit 1
              fi
            }
          done
          
          echo "Successfully pushed chart update"