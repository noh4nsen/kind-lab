name: Docker | Build and Push

on:
  push:
    branches:
      - main
    paths:
      - "src/test-api/**"
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: test-api
  CONTEXT: ./src/test-api
  DOCKERFILE: ./src/test-api/Dockerfile
  CHART_VALUES_FILE: ./src/test-api/chart/values.yaml

jobs:
  build-and-push:
    if: github.actor != 'github-actions[bot]'
    runs-on: arc-scale-set
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Generate Image Refs
        id: image-refs
        run: |
          IMAGE_TAG=$(date +%Y%m%d).${{ github.run_number }}
          IMAGE_REPO="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: |
            ${{ steps.image-refs.outputs.image_repo }}:${{ steps.image-refs.outputs.image_tag }}
            ${{ steps.image-refs.outputs.image_repo }}:latest

      - name: Install yq
        run: |
          if ! command -v yq >/dev/null 2>&1; then
            sudo curl -fsSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 /usr/local/bin/yq
            sudo chmod +x /usr/local/bin/yq
          fi
          yq --version

      - name: Install gh (if missing)
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          fi
          gh --version

      - name: Update Helm values with new image
        env:
          IMAGE_REPO: ${{ steps.image-refs.outputs.image_repo }}
          IMAGE_TAG: ${{ steps.image-refs.outputs.image_tag }}
        run: |
          yq -i '.image.repository = strenv(IMAGE_REPO)' "${CHART_VALUES_FILE}"
          yq -i '.image.tag = strenv(IMAGE_TAG)' "${CHART_VALUES_FILE}"
          echo "Updated ${CHART_VALUES_FILE}:"
          cat "${CHART_VALUES_FILE}"

      - name: Commit and push chart update
        run: |
          if git diff --quiet -- "${CHART_VALUES_FILE}"; then
            echo "No chart changes to commit."
            exit 0
          fi

          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${CHART_VALUES_FILE}"
          git commit -m "chore(test-api): bump image to ${{ steps.image-refs.outputs.image_tag }} [skip ci]"
          git push origin HEAD:${{ github.ref_name }}