name: Docker | CI (Lint & Scan)

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to test (e.g., test-api)'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.detect.outputs.projects }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed projects
        id: detect
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.project }}" ]; then
            # Manual trigger with specific project
            echo "projects=[\"${{ inputs.project }}\"]" >> "$GITHUB_OUTPUT"
          else
            # Auto-detect changed projects in PR
            if [ -z "${{ github.base_ref }}" ]; then
              # Fallback: check all projects if base_ref is empty
              CHANGED_DIRS=$(find src -mindepth 1 -maxdepth 1 -type d -exec basename {} \;)
            else
              # Get changed files between base and head
              CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
              CHANGED_DIRS=$(echo "$CHANGED_FILES" | grep '^src/' | cut -d'/' -f2 | sort -u)
            fi
            
            # Convert to JSON array
            PROJECTS=$(echo "$CHANGED_DIRS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "projects=${PROJECTS}" >> "$GITHUB_OUTPUT"
            echo "Detected projects: ${PROJECTS}"
          fi

  hadolint:
    needs: detect-changes
    if: needs.detect-changes.outputs.projects != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.projects) }}
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate project structure
        id: validate
        run: |
          PROJECT_PATH="src/${{ matrix.project }}"
          
          if [ ! -d "$PROJECT_PATH" ]; then
            echo "❌ Project directory not found: $PROJECT_PATH"
            exit 1
          fi
          
          if [ ! -f "$PROJECT_PATH/Dockerfile" ]; then
            echo "❌ Dockerfile not found in $PROJECT_PATH"
            exit 1
          fi
          
          echo "dockerfile=$PROJECT_PATH/Dockerfile" >> "$GITHUB_OUTPUT"

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ steps.validate.outputs.dockerfile }}
          failure-threshold: warning

  build-and-scan:
    needs: [detect-changes, hadolint]
    if: needs.detect-changes.outputs.projects != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.projects) }}
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate project structure
        id: validate
        run: |
          PROJECT_PATH="src/${{ matrix.project }}"
          
          if [ ! -d "$PROJECT_PATH" ]; then
            echo "❌ Project directory not found: $PROJECT_PATH"
            exit 1
          fi
          
          if [ ! -f "$PROJECT_PATH/Dockerfile" ]; then
            echo "❌ Dockerfile not found in $PROJECT_PATH"
            exit 1
          fi
          
          echo "context=$PROJECT_PATH" >> "$GITHUB_OUTPUT"
          echo "dockerfile=$PROJECT_PATH/Dockerfile" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.validate.outputs.context }}
          file: ${{ steps.validate.outputs.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.project }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.project }}:test
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-${{ matrix.project }}'

      - name: Run Trivy with table output
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.project }}:test
          format: 'table'
          output: 'trivy-table.txt'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Comment Trivy results on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const trivyTable = fs.readFileSync('trivy-table.txt', 'utf8');
            
            const comment = `## 🔍 Trivy Scan Results - ${{ matrix.project }}
            
            \`\`\`
            ${trivyTable}
            \`\`\`

            **Project:** \`${{ matrix.project }}\`
            **Scan Type:** Container Image Vulnerability Scan
            **Severity Levels:** CRITICAL, HIGH, MEDIUM
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  summary:
    needs: [detect-changes, hadolint, build-and-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print workflow summary
        run: |
          echo "## ✅ Docker CI Workflow Summary"
          echo "Projects scanned: ${{ join(fromJson(needs.detect-changes.outputs.projects), ', ') }}"
          echo "- Hadolint: ✓"
          echo "- Trivy: ✓"